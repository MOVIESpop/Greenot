<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GREENOT AI - Cyber Brain Crown Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Assistant', sans-serif;
            background-color: #f7faf9;
            overflow: hidden;
        }
        
        .font-logo {
            font-family: 'Montserrat', sans-serif;
        }

        /* הבלחות אור פסטליות עדינות ברקע הכללי */
        @keyframes ambient-light-1 {
            0%, 100% { opacity: 0.35; transform: scale(1) translate(0px, 0px); }
            50% { opacity: 0.55; transform: scale(1.2) translate(40px, -20px); filter: blur(140px); }
        }
        @keyframes ambient-light-2 {
            0%, 100% { opacity: 0.3; transform: scale(1) translate(0px, 0px); }
            50% { opacity: 0.5; transform: scale(1.1) translate(-30px, 30px); filter: blur(160px); }
        }
        .light-glow-1 { animation: ambient-light-1 16s ease-in-out infinite; }
        .light-glow-2 { animation: ambient-light-2 20s ease-in-out infinite alternate; }

        /* --- אפקט זוהר פועם ויוקרתי ללוגו המוח --- */
        @keyframes brain-cyber-glow {
            0%, 100% { 
                filter: drop-shadow(0 0 6px rgba(16, 185, 129, 0.5)) drop-shadow(0 0 15px rgba(6, 182, 212, 0.3));
                transform: scale(1);
            }
            50% { 
                filter: drop-shadow(0 0 16px rgba(52, 211, 153, 0.8)) drop-shadow(0 0 30px rgba(99, 102, 241, 0.6));
                transform: scale(1.04);
            }
        }
        .brain-luxury-core {
            background: linear-gradient(135deg, #059669, #10b981, #06b6d4, #6366f1);
            animation: brain-cyber-glow 4s ease-in-out infinite;
        }

        /* --- מנוע צורות וכתמי צבע מטיילים בתוך ה-Head ובמסך המעבר --- */
        @keyframes travel-blob-1 {
            0%, 100% { transform: translate(0px, 0px) scale(1); border-radius: 40% 60% 70% 30% / 40% 40% 60% 50%; }
            50% { transform: translate(140px, -15px) scale(1.35); border-radius: 60% 40% 50% 50% / 30% 60% 40% 70%; }
        }
        @keyframes travel-blob-2 {
            0%, 100% { transform: translate(0px, 0px) scale(1.1); border-radius: 50% 50% 30% 70% / 50% 40% 60% 40%; }
            50% { transform: translate(-120px, 20px) scale(0.85); border-radius: 40% 60% 60% 40% / 60% 30% 70% 40%; }
        }
        @keyframes travel-blob-3 {
            0%, 100% { transform: translate(0px, 0px) scale(0.9); }
            50% { transform: translate(80px, 15px) scale(1.25); }
        }

        .head-shape-pink { top: -25px; right: 15%; animation: travel-blob-1 10s ease-in-out infinite; }
        .head-shape-blue { bottom: -35px; left: 20%; animation: travel-blob-2 14s ease-in-out infinite alternate; }
        .head-shape-purple { top: -15px; left: 35%; animation: travel-blob-1 12s ease-in-out infinite reverse; }
        .head-shape-mint { bottom: -20px; right: 40%; animation: travel-blob-2 9s ease-in-out infinite; }
        .head-shape-amber { top: -10px; left: 10%; animation: travel-blob-3 11s ease-in-out infinite; }
        .head-shape-cyan { bottom: -25px; right: 10%; animation: travel-blob-3 13s ease-in-out infinite reverse; }

        /* אנימציה מיוחדת לבועות מסך המעבר הראשי */
        @keyframes transition-fluid {
            0%, 100% { transform: scale(1) translate(0px, 0px); filter: blur(40px); }
            50% { transform: scale(1.4) translate(50px, -40px); filter: blur(60px); }
        }
        .trans-blob-1 { animation: transition-fluid 4s ease-in-out infinite; }
        .trans-blob-2 { animation: transition-fluid 5s ease-in-out infinite reverse; }

        /* ========================================================== */
        /* מנוע ליבת חשיבה מופרדת היפר-ניאון (High-Contrast Core)   */
        /* ========================================================== */
        @keyframes neon-orbit-cyan {
            0% { transform: rotate(0deg) scale(1); border-radius: 35% 65% 60% 40% / 40% 40% 60% 60%; }
            50% { transform: rotate(180deg) scale(1.2); border-radius: 60% 40% 40% 60% / 55% 45% 55% 45%; }
            100% { transform: rotate(360deg) scale(1); border-radius: 35% 65% 60% 40% / 40% 40% 60% 60%; }
        }
        @keyframes neon-orbit-magenta {
            0% { transform: rotate(360deg) scale(1.15); border-radius: 50% 50% 35% 65% / 45% 60% 40% 55%; }
            50% { transform: rotate(180deg) scale(0.85); border-radius: 40% 60% 60% 40% / 60% 40% 65% 35%; }
            100% { transform: rotate(0deg) scale(1.15); border-radius: 50% 50% 35% 65% / 45% 60% 40% 55%; }
        }
        @keyframes neon-pulse-lime {
            0%, 100% { transform: scale(0.9); filter: drop-shadow(0 0 10px #00ff66) blur(2px); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 22px #00ff66) blur(4px); }
        }
        @keyframes nucleus-glow {
            0%, 100% { box-shadow: 0 0 12px #ffffff, 0 0 25px #00f0ff; transform: scale(0.9); }
            50% { box-shadow: 0 0 20px #ffffff, 0 0 35px #ff007f; transform: scale(1.1); }
        }

        .cyber-thinking-pod {
            background: linear-gradient(135deg, rgba(10, 15, 30, 0.95), rgba(20, 25, 45, 0.9));
            border: 1px solid rgba(0, 240, 255, 0.25);
            box-shadow: inset 0 0 15px rgba(0, 240, 255, 0.1), 0 12px 30px rgba(0, 0, 0, 0.25);
        }

        .neon-globe-container {
            position: relative;
            width: 58px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: visible;
        }

        .neon-shell-cyan {
            position: absolute;
            inset: 2px;
            border: 2px solid #00f0ff;
            box-shadow: 0 0 14px #00f0ff, inset 0 0 8px rgba(0, 240, 255, 0.5);
            animation: neon-orbit-cyan 1.6s linear infinite;
            mix-blend-mode: color-dodge;
        }

        .neon-shell-magenta {
            position: absolute;
            inset: 6px;
            border: 2px solid #ff007f;
            box-shadow: 0 0 16px #ff007f, inset 0 0 8px rgba(255, 0, 127, 0.5);
            animation: neon-orbit-magenta 2.2s linear infinite;
            mix-blend-mode: color-dodge;
        }

        .neon-shell-lime {
            position: absolute;
            inset: 12px;
            background: transparent;
            border: 2px dashed #00ff66;
            animation: neon-pulse-lime 1.2s ease-in-out infinite;
            mix-blend-mode: screen;
        }

        .cyber-photon-nucleus {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #ffffff;
            border-radius: 50%;
            animation: nucleus-glow 1s ease-in-out infinite;
            z-index: 10;
        }

        /* --- מנוע ליבות האור של פרופילי ההודעות --- */
        @keyframes agent-core-flow {
            0% { background-position: 0% 50%; box-shadow: 0 0 15px rgba(147, 51, 234, 0.4), 0 0 25px rgba(236, 72, 153, 0.2); }
            50% { background-position: 100% 50%; box-shadow: 0 0 25px rgba(59, 130, 246, 0.5), 0 0 35px rgba(239, 68, 68, 0.25); }
            100% { background-position: 0% 50%; box-shadow: 0 0 15px rgba(147, 51, 234, 0.4), 0 0 25px rgba(236, 72, 153, 0.2); }
        }
        .agent-light-profile {
            background: linear-gradient(-45deg, #9333ea, #ec4899, #ef4444, #3b82f6);
            background-size: 300% 300%;
            animation: agent-core-flow 4s ease-in-out infinite;
        }

        @keyframes user-core-flow {
            0% { background-position: 0% 50%; box-shadow: 0 0 12px rgba(16, 185, 129, 0.3); }
            50% { background-position: 100% 50%; box-shadow: 0 0 20px rgba(52, 211, 153, 0.5); }
            100% { background-position: 0% 50%; box-shadow: 0 0 12px rgba(16, 185, 129, 0.3); }
        }
        .user-light-profile {
            background: linear-gradient(-45deg, #0f766e, #10b981, #6ee7b7, #047857);
            background-size: 300% 300%;
            animation: user-core-flow 5s ease-in-out infinite;
        }

        .pulse-indicator { animation: core-pulse 2s ease-in-out infinite; }
        @keyframes core-pulse {
            0%, 100% { transform: scale(0.9); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        /* --- מסגרת האור הנוזלית (Luxury Liquid Frame) --- */
        @keyframes rotate-liquid-border {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .animated-frame-container {
            position: relative;
            overflow: hidden;
            border-radius: 1.75rem;
            background: rgba(220, 228, 225, 0.4);
        }
        .animated-frame-container::before {
            content: '';
            position: absolute;
            top: -60%;
            left: -60%;
            width: 220%;
            height: 220%;
            background: conic-gradient(
                transparent 20%, 
                rgba(16, 185, 129, 0.45) 40%, 
                rgba(99, 102, 241, 0.35) 50%, 
                rgba(236, 72, 153, 0.2) 60%,
                transparent 80%
            );
            animation: rotate-liquid-border 12s linear infinite;
            z-index: 0;
        }
        .inner-chat-layout {
            position: relative;
            z-index: 1;
            margin: 1px;
            border-radius: calc(1.75rem - 1px);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.025);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(16, 185, 129, 0.2); border-radius: 10px; }
    </style>
</head>

    <script>
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const chatContainer = document.getElementById('chat-container');
        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const fullTransitionScreen = document.getElementById('full-transition-screen');
        const brainIframe = document.getElementById('brain-core-gateway');
        
        const submitBtn = document.getElementById('submit-btn');
        const btnText = document.getElementById('btn-text');
        const btnIcon = document.getElementById('btn-icon');
        const btnWrapper = document.getElementById('btn-wrapper');

        let isProcessing = false;
        let activeThinkingBlock = null;

        function openSidebar() {
            sidebarOverlay.classList.remove('hidden');
            setTimeout(() => { sidebarOverlay.classList.add('opacity-100'); sidebar.classList.remove('-translate-x-full'); }, 10);
        }
        function closeSidebar() {
            sidebar.classList.add('-translate-x-full');
            sidebarOverlay.classList.remove('opacity-100');
            setTimeout(() => { sidebarOverlay.classList.add('hidden'); }, 300);
        }
        menuToggle.addEventListener('click', openSidebar);
        sidebarOverlay.addEventListener('click', closeSidebar);

        document.querySelectorAll('.nav-transition-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                const targetUrl = this.getAttribute('data-target');
                closeSidebar();
                setTimeout(() => {
                    fullTransitionScreen.classList.remove('pointer-events-none');
                    fullTransitionScreen.classList.add('opacity-100');
                    setTimeout(() => { window.location.href = targetUrl; }, 2000);
                }, 150);
            });
        });

        function injectThinkingBlock(logSteps) {
            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = "flex items-start gap-4 max-w-[85%] animate-fade-in";
            thinkingDiv.id = "core-thinking-block";

            thinkingDiv.innerHTML = `
                <div class="agent-light-profile w-9 h-9 rounded-xl flex items-center justify-center text-white shrink-0 mt-1 relative overflow-hidden">
                    <div class="absolute inset-[2px] bg-black/5 rounded-[10px] backdrop-blur-[2px] flex items-center justify-center">
                        <i class="fa-solid fa-brain text-xs animate-pulse"></i>
                    </div>
                </div>
                <div class="cyber-thinking-pod p-4 rounded-2xl rounded-tr-none text-gray-300 text-xs flex items-center gap-4 min-w-[290px]">
                    <div class="neon-globe-container shrink-0">
                        <div class="neon-shell-cyan"></div>
                        <div class="neon-shell-magenta"></div>
                        <div class="neon-shell-lime"></div>
                        <div class="cyber-photon-nucleus"></div>
                    </div>
                    <div class="flex flex-col gap-1.5 flex-1">
                        <div class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-pink-400 to-green-400 font-extrabold text-xs tracking-wider uppercase font-logo">
                            GREENOT Core Engine
                        </div>
                        <div class="text-[10px] text-gray-400 font-mono tracking-wider transition-all duration-300" id="thinking-step-log">
                            ${logSteps[0] || '[PROCESSING]'}
                        </div>
                    </div>
                </div>
            `;
            chatContainer.appendChild(thinkingDiv);
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });

            const logElement = thinkingDiv.querySelector('#thinking-step-log');
            if (logSteps.length > 1) {
                setTimeout(() => { if(logElement && logSteps[1]) logElement.innerText = logSteps[1]; }, 650);
            }
            if (logSteps.length > 2) {
                setTimeout(() => { if(logElement && logSteps[2]) logElement.innerText = logSteps[2]; }, 1350);
            }

            return thinkingDiv;
        }

        function appendMessage(sender, text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex items-start gap-4 max-w-[85%] ${sender === 'user' ? 'self-end flex-row-reverse' : ''}`;

            const agentAvatarHTML = `
                <div class="agent-light-profile w-9 h-9 rounded-xl flex items-center justify-center text-white shrink-0 mt-1 relative overflow-hidden">
                    <div class="absolute inset-[2px] bg-black/5 rounded-[10px] backdrop-blur-[2px] flex items-center justify-center">
                        <i class="fa-solid fa-atom text-xs pulse-indicator"></i>
                    </div>
                </div>`;

            const userAvatarHTML = `
                <div class="user-light-profile w-9 h-9 rounded-xl flex items-center justify-center text-white shrink-0 mt-1 relative overflow-hidden">
                    <div class="absolute inset-[2px] bg-black/5 rounded-[10px] backdrop-blur-[2px] flex items-center justify-center">
                        <i class="fa-solid fa-user text-xs"></i>
                    </div>
                </div>`;

            messageDiv.innerHTML = `
                ${sender === 'user' ? userAvatarHTML : agentAvatarHTML}
                <div class="glass-panel p-4 rounded-2xl ${sender === 'user' ? 'rounded-tl-none border-emerald-500/20 bg-emerald-50/60 text-emerald-950 font-medium' : 'rounded-tr-none text-gray-700'} text-sm leading-relaxed shadow-sm">
                    ${text.replace(/\n/g, '<br>')}
                </div>
            `;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }

        // שיגור הודעה אל ה-Core
        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text || isProcessing) return;

            isProcessing = true;
            appendMessage('user', text);
            userInput.value = '';
            userInput.disabled = true;

            btnWrapper.style.width = "38px"; 
            submitBtn.classList.add('rounded-full', 'pointer-events-none', 'from-cyan-500', 'to-pink-600', 'animate-pulse');
            btnText.classList.add('hidden');
            btnIcon.className = "fa-solid fa-bolt text-xs animate-spin text-white";

            brainIframe.contentWindow.postMessage({
                type: 'PROCESS_GREENOT_INPUT',
                text: text
            }, '*');
        });

        // קליטת התשובה שחוזרת מקובץ core.html והפעלת הניאונים
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'GREENOT_CORE_RESPONSE') {
                const decision = event.data.decision;

                activeThinkingBlock = injectThinkingBlock(decision.logs);

                setTimeout(() => {
                    if(activeThinkingBlock) activeThinkingBlock.remove();

                    appendMessage('bot', decision.answer);

                    userInput.disabled = false;
                    btnWrapper.style.width = "70px";
                    submitBtn.classList.remove('rounded-full', 'pointer-events-none', 'from-cyan-500', 'to-pink-600', 'animate-pulse');
                    btnText.classList.remove('hidden');
                    btnIcon.className = "fa-solid fa-paper-plane text-[10px]";
                    
                    isProcessing = false;
                    userInput.focus();
                }, decision.thinkingDuration);
            }
        });
    </script>
</body>
</html>
